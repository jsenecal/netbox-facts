[project]
site_name = "NetBox Facts"
site_url = "https://jsenecal.github.io/netbox-facts/"
site_description = "Gather operational facts (interfaces, neighbors, routes) from NetBox-managed network devices via NAPALM"
site_author = "Jonathan Senecal"
repo_url = "https://github.com/jsenecal/netbox-facts"
repo_name = "jsenecal/netbox-facts"
edit_uri = "edit/main/docs/"
docs_dir = "."
nav = [
  { "Home" = "index.md" },
  { "Contributing" = "contributing.md" },
  { "Changelog" = "changelog.md" },
]

[project.theme]
features = [
  "content.action.edit",
  "content.action.view",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.icon]
repo = "fontawesome/brands/github"
