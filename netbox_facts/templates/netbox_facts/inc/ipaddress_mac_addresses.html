{% load helpers %}
{% load i18n %}

<div class="card">
    <h5 class="card-header">{% trans "Known MAC Addresses" %}</h5>
    <div class="card-body">
        <table class="table table-hover attr-table">
            {% for mac in mac_addresses %}
            <tr>
                <td>{{ mac|linkify }}</td>
                <td>{{ mac.vendor|default:"—" }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>
