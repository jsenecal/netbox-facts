name: Release Drafter

# Two triggers:
#   - push to main updates the draft release body and resolves the next
#     version from the labels of PRs merged since the last release.
#   - pull_request_target runs the autolabeler so PRs are categorized BEFORE
#     they merge. pull_request_target uses the base branch's workflow + the
#     base branch's release-drafter.yml, so a malformed config in a PR cannot
#     break labeling. Only the autolabeler step has any effect on PR events;
#     release-drafter detects the context and skips drafting.
on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
